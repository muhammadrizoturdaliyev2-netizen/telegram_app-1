<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilimchi</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:sans-serif;
  background:#f6f7fb;
  width:100vw;
  overflow-x:hidden;
}

/* LOADER */
.loader{
  position:fixed;
  top:0;left:0;
  width:100vw;height:100vh;
  background:#f6f7fb;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  z-index:999;
}

.loader-img{
  width:100%;
  height:60%;
  background:url('loading.jpg') center/cover no-repeat;
}

.circle{
  width:36px;height:36px;
  border:3px solid #e5e7eb;
  border-top:3px solid #60a5fa;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg)}
}

.text{
  text-align:center;
  padding-bottom:25px;
  color:#6b7280;
}

/* MAIN */
.main{
  display:none;
  width:100vw;
  min-height:100vh;
  padding-bottom:110px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:18px;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100vh;
  background:white;
  padding:20px;
  transition:0.3s;
  z-index:1000;
}

.sidebar.active{left:0}

.menu-item{
  padding:14px 0;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
}

.menu-item span{
  color:#a78bfa;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.2);
  display:none;
  z-index:900;
}
.overlay.active{display:block}

/* POPUP */
.popup{
  position:fixed;
  bottom:-200px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  background:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
  transition:0.3s;
  z-index:2000;
}
.popup.active{bottom:30px}

/* NAV (tegilmadi) */
.nav{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  background:white;
  border-radius:25px;
  display:flex;
  justify-content:space-around;
  padding:12px;
}

</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-img"></div>
  <div class="circle"></div>
  <div class="text">
    <h3>Bilimchi</h3>
    <p>Iltimos, biroz kuting 😊</p>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR (🔥 YANGILANGAN) -->
<div class="sidebar" id="sidebar">

<div class="menu-item">🎮 Bilimchi o‘yinlar</div>

<div class="menu-item" onclick="openPopup()">
  🧠 Quiz testlar <span>🔒</span>
</div>

<div class="menu-item" onclick="openPopup()">
  🤖 Bilimchi AI <span>🔒</span>
</div>

<div class="menu-item">📝 Testlar</div>

<div class="menu-item" onclick="openPopup()">
  ⭐ Shaxsiy reja <span>🔒</span>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <h3>Premium bo‘lim 🔒</h3>
  <p>Bu funksiyadan foydalanish uchun Premium kerak 😊</p>
</div>

<!-- MAIN -->
<div class="main" id="main">

<div class="header">
  <div onclick="toggleMenu()">☰</div>
  <div>Bilimchi</div>
  <div>🔔</div>
</div>

<div style="padding:20px;">
  Bugun nimani o‘rganamiz? 😊
</div>

<!-- NAV (o‘zgarmagan) -->
<div class="nav">
  <div>🏠</div>
  <div>📚</div>
  <div>🎯</div>
  <div>🏆</div>
  <div>💎</div>
</div>

</div>

<script>

/* LOADER */
window.onload = function(){
  setTimeout(()=>{
    loader.style.display="none";
    main.style.display="block";
  },3000);
}

/* MENU */
function toggleMenu(){
  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");
}

function closeMenu(){
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
}

/* POPUP */
function openPopup(){
  popup.classList.add("active");
  setTimeout(()=>popup.classList.remove("active"),2000);
}

</script>

</body>
</html>
