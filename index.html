<div class="loader-page">
  <div class="hourglass"></div>

  <h1>Bilimchi app</h1>
  <p>Tez orada yuklanadi...</p>
</div>

<style>
body {
  margin: 0;
  background: #f8fafc;
  font-family: sans-serif;
  color: #0f172a;
}

.loader-page {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* HOURGLASS */
.hourglass {
  width: 50px;
  height: 80px;
  position: relative;
  margin-bottom: 25px;
}

.hourglass::before,
.hourglass::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  border-left: 25px solid transparent;
  border-right: 25px solid transparent;
}

.hourglass::before {
  top: 0;
  border-bottom: 40px solid #3b82f6;
  animation: topSand 2s infinite;
}

.hourglass::after {
  bottom: 0;
  border-top: 40px solid #3b82f6;
  animation: bottomSand 2s infinite;
}

@keyframes topSand {
  0% { transform: scaleY(1); }
  50% { transform: scaleY(0.3); }
  100% { transform: scaleY(1); }
}

@keyframes bottomSand {
  0% { transform: scaleY(0.3); }
  50% { transform: scaleY(1); }
  100% { transform: scaleY(0.3); }
}

/* Text */
h1 {
  font-size: 22px;
  margin: 0;
}

p {
  opacity: 0.6;
  margin-top: 5px;
}
</style>
