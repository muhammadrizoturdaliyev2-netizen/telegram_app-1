<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilimchi</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(180deg,#f8fafc,#eef2ff);
  color:#111827;
  overflow-x:hidden;
}

/* LOADER */
.loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#f8fafc;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  z-index:999;
}

.loader-img{
  width:100%;
  height:60%;
  background:url('loading.jpg') center/cover no-repeat;
}

.circle{
  width:40px;height:40px;
  border:4px solid #ddd;
  border-top:4px solid #6366f1;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg)}}

/* START */
.start{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:10px;
}

input{
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  width:220px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
}

/* MAIN */
.main{display:none;padding-bottom:100px}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:18px;
  font-weight:600;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:white;
  padding:20px;
  transition:0.3s;
  box-shadow:5px 0 25px rgba(0,0,0,0.1);
  z-index:1000;
}
.sidebar.active{left:0}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  display:none;
  z-index:900;
}
.overlay.active{display:block}

/* USER */
.user{text-align:center;margin-bottom:20px}
.user img{width:70px;height:70px;border-radius:50%}

/* MENU */
.menu-item{
  padding:14px 0;
  border-bottom:1px solid #f1f1f1;
  font-weight:500;
}

/* CARD */
.card{
  margin:20px;
  padding:22px;
  border-radius:22px;
  background:rgba(255,255,255,0.9);
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

.top-card{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
}

/* QUICK */
.quick{
  display:flex;
  gap:12px;
  padding:0 20px;
}

.quick div{
  flex:1;
  background:white;
  padding:18px;
  border-radius:18px;
  text-align:center;
}

/* PREMIUM */
.premium{
  background:linear-gradient(135deg,#7c3aed,#a78bfa);
  color:white;
}

/* NAV */
.nav{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  background:white;
  border-radius:30px;
  display:flex;
  justify-content:space-around;
  padding:14px;
}

.nav div{
  font-size:20px;
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-img"></div>
  <div class="circle"></div>
</div>

<!-- START -->
<div class="start" id="start">
  <input id="nameInput" placeholder="Ismingiz">
  <input id="surnameInput" placeholder="Familiyangiz">
  <button onclick="startApp()">Boshlash</button>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="user">
    <img id="avatar">
    <h3 id="username"></h3>
    <p id="userid"></p>
  </div>

  <div class="menu-item">🎮 O‘yinlar</div>
  <div class="menu-item">📝 Testlar</div>
  <div class="menu-item">💎 Premium</div>
</div>

<!-- MAIN -->
<div class="main" id="main">

<div class="header">
  <div onclick="toggleMenu()">☰</div>
  <div>Bilimchi</div>
  <div>🔔</div>
</div>

<!-- HOME -->
<div id="homeScreen">

  <div class="card top-card">
    <h3>Salom 👋</h3>
    <p>Bugun nimani o‘rganamiz?</p>
  </div>

  <div class="quick">
    <div onclick="show('games')">🎮<br>O‘yinlar</div>
    <div onclick="show('tests')">📝<br>Testlar</div>
    <div onclick="show('results')">🏆<br>Natija</div>
  </div>

  <div class="card">
    🌟 Juda yaxshi! davom eting
  </div><div class="card premium">
    💎 Premium orqali barcha imkoniyatlardan foydalanishingiz mumkin
  </div>

</div>

<!-- SCREENS -->
<div id="gamesScreen" style="display:none;padding:20px;">🎮 O‘yinlar</div>
<div id="testsScreen" style="display:none;padding:20px;">📝 Testlar</div>
<div id="resultsScreen" style="display:none;padding:20px;">🏆 Natijalar</div>
<div id="premiumScreen" style="display:none;padding:20px;">💎 Premium</div>

<!-- NAV -->
<div class="nav">
  <div onclick="show('home')">🏠</div>
  <div onclick="show('games')">🎮</div>
  <div onclick="show('tests')">📝</div>
  <div onclick="show('results')">🏆</div>
  <div onclick="show('premium')">💎</div>
</div>

</div>

<script>

/* LOADER */
setTimeout(()=>{
  loader.style.display="none";
  start.style.display="flex";
},3000);

/* START */
function startApp(){
  let name = nameInput.value;
  let surname = surnameInput.value;
  let id = Math.floor(Math.random()*100000);

  username.innerText = name + " " + surname;
  userid.innerText = "ID: " + id;
  avatar.src = "https://ui-avatars.com/api/?name="+name+"+"+surname;

  start.style.display="none";
  main.style.display="block";
}

/* MENU */
function toggleMenu(){
  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");
}

function closeMenu(){
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
}

/* SCREEN */
function show(screen){
  homeScreen.style.display="none";
  gamesScreen.style.display="none";
  testsScreen.style.display="none";
  resultsScreen.style.display="none";
  premiumScreen.style.display="none";

  document.getElementById(screen+"Screen").style.display="block";
}

</script>

</body>
</html>
