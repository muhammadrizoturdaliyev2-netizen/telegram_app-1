<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilimchi</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f8fafc;
}

/* Container */
.loader {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
}

/* RASM */
.img-box {
  width: 100%;
  height: 75vh;
  background: url('loading.jpg') center/cover no-repeat;
  position: relative;
}

/* Pastki fade */
.img-box::after {
  content: "";
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: linear-gradient(to bottom, transparent, #f8fafc);
}

/* Loader */
.loader-circle {
  width: 50px;
  height: 50px;
  border: 4px solid #e2e8f0;
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-top: 10px;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* Text */
.text {
  text-align: center;
  padding-bottom: 30px;
}

h1 {
  margin: 0;
  font-size: 22px;
  color: #0f172a;
}

p {
  margin-top: 5px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="loader">

  <div class="img-box"></div>

  <div class="loader-circle"></div>

  <div class="text">
    <h1>Bilimchi app</h1>
    <p>Tez orada yuklanadi...</p>
  </div>

</div>

</body>
</html>
