<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilimchi</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(180deg,#f8fafc,#eef2ff);
  color:#111827;
  overflow-x:hidden;
}

/* LOADER */
.loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#f8fafc;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  z-index:999;
}

.loader-img{
  width:100%;
  height:60%;
  background:url('loading.jpg') center/cover no-repeat;
}

.loader-text{
  text-align:center;
  padding:20px;
}

.loader-text h2{
  font-size:20px;
  font-weight:600;
}

.loader-text p{
  font-size:14px;
  color:#6b7280;
  margin-top:5px;
}

.circle{
  width:40px;height:40px;
  border:4px solid #ddd;
  border-top:4px solid #6366f1;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-top:15px;
}

@keyframes spin{100%{transform:rotate(360deg)}}

/* START */
.start{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.start-box{
  width:90%;
  max-width:350px;
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  display:flex;
  flex-direction:column;
  gap:15px;
  text-align:center;
}

.start-box input{
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
}

.start-box button{
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
}

/* MINI LOADER */
.mini-loader{
  width:30px;
  height:30px;
  border:3px solid #ddd;
  border-top:3px solid #6366f1;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

/* MAIN */
.main{display:none;padding-bottom:100px}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:18px;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:white;
  padding:20px;
  transition:0.3s;
  z-index:1000;
}
.sidebar.active{left:0}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  display:none;
  z-index:900;
}
.overlay.active{display:block}

/* USER */
.user{text-align:center;margin-bottom:20px}
.user img{width:70px;height:70px;border-radius:50%}

/* MENU */
.menu-item{
  padding:14px 0;
  border-bottom:1px solid #eee;
}

/* CARD */
.card{
  margin:20px;
  padding:22px;
  border-radius:22px;
  background:white;
}

/* NAV */
.nav{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  background:white;
  border-radius:30px;
  display:flex;
  justify-content:space-around;
  padding:14px;
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-img"></div>

  <div class="loader-text">
    <h2>Bilimchi tayyorlanmoqda</h2>
    <p>Iltimos, biroz kuting... siz uchun hamma narsa tayyorlanmoqda 😊</p>
    <div class="circle"></div>
  </div>
</div>

<!-- START -->
<div class="start" id="start">
  <div class="start-box">
    <h2>Xush kelibsiz 👋</h2>
    <input id="nameInput" placeholder="Ismingiz">
    <input id="surnameInput" placeholder="Familiyangiz">
    <button onclick="startApp(event)">Boshlash</button>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="user">
    <img id="avatar">
    <h3 id="username"></h3>
    <p id="userid"></p>
  </div>

  <div class="menu-item">🎮 O‘yinlar</div>
  <div class="menu-item">📝 Testlar</div>
  <div class="menu-item">💎 Premium</div>
</div>

<!-- MAIN -->
<div class="main" id="main">

<div class="header">
  <div onclick="toggleMenu()">☰</div>
  <div>Bilimchi</div>
  <div>🔔</div>
</div>

<div id="homeScreen">

  <div class="card">
    Salom 👋
  </div>

  <div class="card">
    🌟 Juda yaxshi! davom eting
  </div>

</div><div id="gamesScreen" style="display:none;padding:20px;">🎮 O‘yinlar</div>
<div id="testsScreen" style="display:none;padding:20px;">📝 Testlar</div>
<div id="resultsScreen" style="display:none;padding:20px;">🏆 Natijalar</div>
<div id="premiumScreen" style="display:none;padding:20px;">💎 Premium</div>

<div class="nav">
  <div onclick="show('home')">🏠</div>
  <div onclick="show('games')">🎮</div>
  <div onclick="show('tests')">📝</div>
  <div onclick="show('results')">🏆</div>
  <div onclick="show('premium')">💎</div>
</div>

</div>

<script>

/* LOADER */
setTimeout(()=>{
  loader.style.display="none";
  start.style.display="flex";
},3000);

/* START */
function startApp(e){

  let name = nameInput.value;
  let surname = surnameInput.value;

  if(!name || !surname){
    alert("Ism kiriting");
    return;
  }

  e.target.innerHTML = '<div class="mini-loader"></div>';

  setTimeout(()=>{
    let id = Math.floor(Math.random()*100000);

    username.innerText = name + " " + surname;
    userid.innerText = "ID: " + id;
    avatar.src = "https://ui-avatars.com/api/?name="+name+"+"+surname;

    start.style.display="none";
    main.style.display="block";
  },1500);
}

/* MENU */
function toggleMenu(){
  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");
}

function closeMenu(){
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
}

/* SCREEN */
function show(screen){
  homeScreen.style.display="none";
  gamesScreen.style.display="none";
  testsScreen.style.display="none";
  resultsScreen.style.display="none";
  premiumScreen.style.display="none";

  document.getElementById(screen+"Screen").style.display="block";
}

</script>

</body>
</html>
