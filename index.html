<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilimchi</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:sans-serif;
  background:#f6f7fb;
  overflow-x:hidden;
}

/* LOADER */
.loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#f6f7fb;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.circle{
  width:40px;height:40px;
  border:4px solid #ddd;
  border-top:4px solid #6366f1;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg)}}

/* START */
.start{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.start-box{
  width:90%;
  max-width:350px;
  background:white;
  padding:25px;
  border-radius:20px;
  text-align:center;
}

.start-box input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

.start-box button{
  margin-top:15px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#6366f1;
  color:white;
}

/* MAIN */
.main{display:none;padding-bottom:100px}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:white;
  padding:20px;
  transition:0.3s;
  z-index:1000;
}
.sidebar.active{left:0}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  display:none;
  z-index:900;
}
.overlay.active{display:block}

/* QUICK */
.quick{
  display:flex;
  gap:10px;
  padding:20px;
}

.big, .small{
  flex:1;
  padding:20px;
  border-radius:15px;
  color:white;
  text-align:center;
}

.big{
  background:#6366f1;
}

.small{
  background:#8b5cf6;
}

/* CARD */
.card{
  margin:20px;
  padding:20px;
  background:white;
  border-radius:15px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:20px;
  width:90%;
  left:5%;
  background:white;
  border-radius:20px;
  display:flex;
  justify-content:space-around;
  padding:15px;
}

/* GAME */
.game-card{
  margin:10px 0;
  padding:15px;
  border-radius:15px;
  color:white;
}
.free{background:#10b981}
.locked{background:#6366f1}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="circle"></div>
  <p>Yuklanmoqda...</p>
</div>

<!-- START -->
<div class="start" id="start">
  <div class="start-box">
    <h3>Ismingizni kiriting</h3>
    <input id="nameInput" placeholder="Ism">
    <input id="surnameInput" placeholder="Familiya">
    <button onclick="startApp()">Boshlash</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3 id="username"></h3>
</div>

<!-- MAIN -->
<div class="main" id="main">

<div class="header">
  <div onclick="toggleMenu()">☰</div>
  <div>Bilimchi</div>
</div>

<!-- HOME -->
<div id="homeScreen">

<div class="quick">
  <div class="big" onclick="show('games')">🎮 O‘yinlar</div>
  <div class="small" onclick="show('lesson')">📚 Darslar</div>
  <div class="small" onclick="show('results')">🏆 Natija</div>
</div>

<div class="card">🌟 Juda yaxshi! davom eting</div>

</div>

<!-- GAMES -->
<div id="gamesScreen" style="display:none;padding:20px;">
  <h2>O‘yinlar</h2>

  <div class="game-card free" onclick="show('battle')">Quiz (Free)</div>
  <div class="game-card locked">Battle 🔒</div>
  <div class="game-card locked">Speed 🔒</div>

</div>

<!-- LESSON -->
<div id="lessonScreen" style="display:none;padding:20px;">
  <h2>Darslar</h2>
  <div class="card" onclick="openLesson()">HTML</div>
</div>

<div id="lessonView" style="display:none;padding:20px;">
  <h2>HTML</h2>
  <p>HTML asoslari...</p>
</div><!-- BATTLE -->
<div id="battleScreen" style="display:none;padding:20px;">
  <h2>Battle</h2>
  <button onclick="startBattle()">Start</button>
  <h3 id="qText"></h3>
  <div onclick="answer(0)">A</div>
  <div onclick="answer(1)">B</div>
</div>

<div id="resultsScreen" style="display:none;padding:20px;">Natijalar</div>

<!-- NAV -->
<div class="nav">
  <div onclick="show('home')">🏠</div>
  <div onclick="show('games')">🎮</div>
  <div onclick="show('lesson')">📚</div>
</div>

</div>

<script>

/* LOADER FIX */
window.onload = function(){
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
    document.getElementById("start").style.display="flex";
  },3000);
};

/* START */
function startApp(){
  let name = document.getElementById("nameInput").value;
  document.getElementById("username").innerText = name;
  document.getElementById("start").style.display="none";
  document.getElementById("main").style.display="block";
}

/* MENU */
function toggleMenu(){
  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");
}
function closeMenu(){
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
}

/* SCREEN */
function show(screen){
  document.getElementById("homeScreen").style.display="none";
  document.getElementById("gamesScreen").style.display="none";
  document.getElementById("lessonScreen").style.display="none";
  document.getElementById("lessonView").style.display="none";
  document.getElementById("battleScreen").style.display="none";
  document.getElementById("resultsScreen").style.display="none";

  document.getElementById(screen+"Screen").style.display="block";
}

/* LESSON */
function openLesson(){
  document.getElementById("lessonScreen").style.display="none";
  document.getElementById("lessonView").style.display="block";
}

/* BATTLE */
function startBattle(){
  document.getElementById("qText").innerText="HTML nima?";
}
function answer(){
  alert("Javob tanlandi");
}

</script>

</body>
</html>
