<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilimchi</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#f6f7fb;overflow-x:hidden}

/* LOADER */
.loader{
  position:fixed;width:100%;height:100%;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  background:#f6f7fb;z-index:999;
}
.circle{
  width:40px;height:40px;border:4px solid #ddd;
  border-top:4px solid #6366f1;border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg)}}

/* START */
.start{
  display:none;height:100vh;
  justify-content:center;align-items:center;
}
.start-box{
  width:90%;max-width:350px;
  background:white;padding:20px;border-radius:15px;
  text-align:center;
}
.start-box input{
  width:100%;padding:12px;margin-top:10px;
  border-radius:10px;border:1px solid #ddd;
}
.start-box button{
  width:100%;padding:12px;margin-top:10px;
  background:#6366f1;color:white;border:none;border-radius:10px;
}

/* MAIN */
.main{display:none;padding-bottom:120px}

/* HEADER */
.header{display:flex;justify-content:space-between;padding:15px}

/* SIDEBAR */
.sidebar{
  position:fixed;left:-260px;top:0;width:260px;height:100%;
  background:white;padding:20px;transition:.3s;z-index:1000;
}
.sidebar.active{left:0}

/* OVERLAY */
.overlay{
  position:fixed;width:100%;height:100%;
  background:rgba(0,0,0,0.3);display:none;z-index:900;
}
.overlay.active{display:block}

/* QUICK */
.quick{display:flex;gap:10px;padding:20px}
.big,.small{
  flex:1;padding:20px;border-radius:15px;color:white;text-align:center;
}
.big{background:#6366f1}
.small{background:#8b5cf6}

/* CARD */
.card{margin:20px;padding:20px;background:white;border-radius:15px}

/* NAV */
.nav{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%);
  width:92%;background:white;border-radius:25px;
  display:flex;justify-content:space-around;padding:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* GAMES */
.game-card{
  margin-top:10px;padding:15px;border-radius:15px;color:white;
}
.free{background:#10b981}
.locked{background:#6366f1}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="circle"></div>
  <p>Yuklanmoqda...</p>
</div>

<!-- START -->
<div class="start" id="start">
  <div class="start-box">
    <h3>Ismingiz</h3>
    <input id="nameInput">
    <button onclick="startApp()">Boshlash</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3 id="username"></h3>

  <div onclick="show('games')">🎮 O‘yinlar</div>
  <div onclick="show('lesson')">📚 Darslar</div>
  <div onclick="show('premium')">💎 Premium</div>
</div>

<!-- MAIN -->
<div class="main" id="main">

<div class="header">
  <div onclick="toggleMenu()">☰</div>
  <div>Bilimchi</div>
</div>

<!-- HOME -->
<div id="homeScreen">
  <div class="quick">
    <div class="big" onclick="show('games')">🎮</div>
    <div class="small" onclick="show('lesson')">📚</div>
    <div class="small" onclick="show('results')">🏆</div>
  </div>
</div>

<!-- GAMES -->
<div id="gamesScreen" style="display:none;padding:20px;">
  <h2>O‘yinlar</h2>

  <div class="game-card free" onclick="show('battle')">Quiz (free)</div>
  <div class="game-card locked" onclick="premiumAlert()">Battle 🔒</div>
  <div class="game-card locked" onclick="premiumAlert()">Speed 🔒</div>
  <div class="game-card locked" onclick="premiumAlert()">Matching 🔒</div>
  <div class="game-card locked" onclick="premiumAlert()">Boss 🔒</div>
</div>

<!-- LESSON -->
<div id="lessonScreen" style="display:none;padding:20px;">
  <h2>Darslar</h2>
  <div class="card" onclick="openLesson()">HTML</div>
</div>

<div id="lessonView" style="display:none;padding:20px;">
  <h2>HTML</h2>
  <p>HTML asoslari...</p>
</div><!-- BATTLE -->
<div id="battleScreen" style="display:none;padding:20px;">
  <h2>Battle</h2>
  <button onclick="startBattle()">Boshlash</button>
  <h3 id="qText"></h3>
  <div onclick="answer(0)">A</div>
  <div onclick="answer(1)">B</div>
</div>

<div id="resultsScreen" style="display:none;padding:20px;">Natijalar</div>
<div id="premiumScreen" style="display:none;padding:20px;">Premium</div>

<!-- NAV -->
<div class="nav">
  <div onclick="show('home')">🏠</div>
  <div onclick="show('games')">🎮</div>
  <div onclick="show('lesson')">📚</div>
  <div onclick="show('results')">🏆</div>
</div>

</div>

<script>

/* LOADER */
window.onload = ()=>{
  setTimeout(()=>{
    loader.style.display="none";
    start.style.display="flex";
  },3000);
};

/* START */
function startApp(){
  username.innerText = nameInput.value;
  start.style.display="none";
  main.style.display="block";
}

/* MENU */
function toggleMenu(){
  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");
}
function closeMenu(){
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
}

/* SCREEN SWITCH */
function show(screen){
  closeMenu();

  let screens=[
    "homeScreen","gamesScreen","lessonScreen",
    "lessonView","battleScreen","resultsScreen","premiumScreen"
  ];

  screens.forEach(id=>{
    let el=document.getElementById(id);
    if(el) el.style.display="none";
  });

  document.getElementById(screen+"Screen").style.display="block";
}

/* LESSON */
function openLesson(){
  lessonScreen.style.display="none";
  lessonView.style.display="block";
}

/* PREMIUM */
function premiumAlert(){
  alert("Bu o‘yin Premium uchun 🔒");
}

/* BATTLE */
function startBattle(){
  qText.innerText="HTML nima?";
}
function answer(){
  alert("Javob tanlandi");
}

</script>

</body>
</html>
