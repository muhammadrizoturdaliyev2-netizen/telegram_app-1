<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
  overflow:hidden;
}

/* SCREEN */
.screen{display:none;height:100vh;padding:20px}
.active{display:block}

/* LOADER */
.loader{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
}

.loader img{
  width:200px;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.bar{
  width:200px;height:12px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  overflow:hidden;
}

.fill{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#a855f7,#06b6d4);
  animation:load 3s forwards;
}

@keyframes load{
  to{width:100%}
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.icon{
  font-size:22px;
  cursor:pointer;
}

/* CARDS */
.grid{
  display:flex;
  gap:10px;
}

.card{
  flex:1;
  height:100px;
  background:linear-gradient(135deg,#1e40af,#9333ea);
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

/* GAMES LIST */
.game{
  height:60px;
  margin-bottom:15px;
  border-radius:15px;
  background:linear-gradient(135deg,#1e40af,#9333ea);
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  display:flex;
  align-items:center;
  padding-left:15px;
  transition:0.3s;
}

.game:hover{
  transform:translateY(-3px);
}

/* NAV */
.nav{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  height:65px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  border-radius:30px;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.nav div{
  font-size:22px;
  cursor:pointer;
  transition:0.3s;
}

.nav div.active{
  transform:scale(1.2);
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="screen active loader" id="loader">
  <img src="https://i.imgur.com/6VBx3io.png">
  <div>Loading...</div>
  <div class="bar"><div class="fill"></div></div>
</div>

<!-- HOME -->
<div class="screen" id="home">

  <div class="header">
    <div class="icon">☰</div>
    <div>👤</div>
    <div>🔔</div>
  </div>

  <div class="grid">
    <div class="card">📚</div>
    <div style="display:flex;flex-direction:column;gap:10px;flex:1">
      <div class="card">💎</div>
      <div class="card">📊</div>
    </div>
  </div>

</div>

<!-- GAMES -->
<div class="screen" id="games">

  <h2>Games</h2>

  <div class="game">🎮 Quiz</div>
  <div class="game">⚔️ Battle</div>
  <div class="game">⏱ Speed</div>
  <div class="game">🧠 Logic</div>
  <div class="game">👑 Boss</div>

</div>

<!-- NAV -->
<div class="nav">
  <div onclick="openScreen('home',this)" class="active">🏠</div>
  <div onclick="openScreen('games',this)">🎮</div>
  <div>📚</div>
  <div>💎</div>
</div>

<script>

// LOADER → HOME
setTimeout(()=>{
  document.getElementById("loader").classList.remove("active");
  document.getElementById("home").classList.add("active");
},3000);

// SCREEN SWITCH
function openScreen(id,el){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".nav div").forEach(i=>i.classList.remove("active"));
  el.classList.add("active");
}

</script>

</body>
</html>
