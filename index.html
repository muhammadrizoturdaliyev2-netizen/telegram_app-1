<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilimchi</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f8fafc;
}

/* LOADER */
.loader-page {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  z-index: 999;
}

.img-box {
  width: 100%;
  height: 75vh;
  background: url('loading.jpg') center/cover no-repeat;
}

.loader-circle {
  width: 50px;
  height: 50px;
  border: 4px solid #e2e8f0;
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.loader-text {
  text-align: center;
  padding-bottom: 30px;
}

/* MAIN PAGE */
.main {
  display: none;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 18px;
}

.title {
  font-weight: 600;
  color: #a16207;
}

/* CARD */
.container {
  padding: 20px;
}

.card {
  height: 120px;
  border-radius: 20px;
  background: linear-gradient(135deg, #e2e8f0, #cbd5f5);
}

/* NAV */
.bottom-nav {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 400px;
  background: white;
  border-radius: 25px;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 12px;
  color: #94a3b8;
  cursor: pointer;
  transition: 0.3s;
}

.nav-item.active {
  color: #3b82f6;
  transform: translateY(-5px);
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader-page" id="loader">
  <div class="img-box"></div>
  <div class="loader-circle"></div>
  <div class="loader-text">
    <h1>Bilimchi app</h1>
    <p>Tez orada yuklanadi...</p>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <div class="header">
    <div>☰</div>
    <div class="title">ASOSIY OYNA</div>
    <div>🔔</div>
  </div>

  <div class="container">
    <div class="card"></div>
  </div>

  <!-- NAV -->
  <div class="bottom-nav">
    <div class="nav-item active">🏠<span>Asosiy</span></div>
    <div class="nav-item">📚<span>Kurslar</span></div>
    <div class="nav-item">🏆<span>Reyting</span></div>
    <div class="nav-item">👤<span>Profil</span></div>
  </div>

</div>

<script>

/* LOADER → MAIN */
setTimeout(() => {
  document.getElementById("loader").style.display = "none";
  document.getElementById("main").style.display = "block";
}, 2500);

</script>

</body>
</html>
