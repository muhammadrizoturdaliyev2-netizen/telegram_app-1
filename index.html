<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilimchi</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f8fafc;
}

/* LOADER */
.loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#f8fafc;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

/* MAIN */
.main{
  display:none;
  height:100vh;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.title{
  color:#a16207;
  font-weight:bold;
}

/* CARD */
.card{
  margin:20px;
  height:120px;
  border-radius:15px;
  background:#e2e8f0;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:white;
  box-shadow:5px 0 20px rgba(0,0,0,0.1);
  transition:0.3s;
  padding:20px;
  z-index:1000;
}

.sidebar.active{
  left:0;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  display:none;
  z-index:900;
}

.overlay.active{
  display:block;
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
  Yuklanmoqda...
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  MENU
</div>

<!-- MAIN -->
<div class="main" id="main">

  <div class="header">
    <div onclick="toggleMenu()">☰</div>
    <div class="title">ASOSIY OYNA</div>
    <div>🔔</div>
  </div>

  <div class="card"></div>

</div>

<script>

/* LOADER */
setTimeout(function(){
  document.getElementById("loader").style.display = "none";
  document.getElementById("main").style.display = "block";
},1500);

/* MENU */
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

function closeMenu(){
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

</script>

</body>
</html>
