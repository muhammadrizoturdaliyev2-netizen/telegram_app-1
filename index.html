<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilimchi</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: sans-serif;
  background: #f8fafc;
}

/* LOADER */
.loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
}

.img {
  width: 100%;
  height: 65%;
  background: url('loading.jpg') center/cover no-repeat;
}

.circle {
  width: 40px;
  height: 40px;
  border: 4px solid #ddd;
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.text {
  text-align: center;
  padding-bottom: 20px;
}

/* MAIN */
.main {
  display: none;
  width: 100%;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
}

.title {
  color: #a16207;
  font-weight: bold;
}

/* CARD */
.card {
  margin: 20px;
  height: 120px;
  border-radius: 15px;
  background: #e2e8f0;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  border-top: 1px solid #eee;
}

.item {
  text-align: center;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="img"></div>
  <div class="circle"></div>
  <div class="text">
    <h2>Bilimchi app</h2>
    <p>Yuklanmoqda...</p>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <div class="header">
    <div>☰</div>
    <div class="title">ASOSIY OYNA</div>
    <div>🔔</div>
  </div>

  <div class="card"></div>

  <div class="nav">
    <div class="item">🏠</div>
    <div class="item">📚</div>
    <div class="item">🎯</div>
    <div class="item">🏆</div>
    <div class="item">💎</div>
  </div>

</div>

<script>
setTimeout(() => {
  document.getElementById("loader").style.display = "none";
  document.getElementById("main").style.display = "block";
}, 2000);
</script>

</body>
</html>
