<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilimchi</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f8fafc;
}

/* LOADER */
.loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#f8fafc;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

/* MAIN */
.main{
  display:none;
  height:100vh;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.title{
  color:#a16207;
  font-weight:bold;
}

/* CARD */
.card{
  margin:20px;
  height:120px;
  border-radius:15px;
  background:#e2e8f0;
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
  Yuklanmoqda...
</div>

<!-- MAIN -->
<div class="main" id="main">

  <div class="header">
    <div>☰</div>
    <div class="title">ASOSIY OYNA</div>
    <div>🔔</div>
  </div>

  <div class="card"></div>

</div>

<script>
setTimeout(function(){
  document.getElementById("loader").style.display = "none";
  document.getElementById("main").style.display = "block";
},1500);
</script>

</body>
</html>
