<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilimchi</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:sans-serif;
  background:#f8fafc;
  width:100vw;
  overflow-x:hidden;
}

/* LOADER */
.loader{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:#f8fafc;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  z-index:999;
}

.loader-img{
  width:100%;
  height:65%;
  background:url('loading.jpg') center/cover no-repeat;
}

.circle{
  width:40px;
  height:40px;
  border:4px solid #ddd;
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg)}
}

.text{
  text-align:center;
  padding-bottom:20px;
}

/* MAIN */
.main{
  display:none;
  width:100vw;
  min-height:100vh;
  padding-bottom:100px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

.title{
  color:#111827;
  font-weight:bold;
  font-size:18px;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100vh;
  background:white;
  box-shadow:5px 0 20px rgba(0,0,0,0.1);
  transition:0.3s;
  padding:20px;
  z-index:1000;
}

.sidebar.active{
  left:0;
}

/* USER */
.user{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}

.user img{
  width:45px;
  height:45px;
  border-radius:50%;
}

.menu-item{
  padding:12px 0;
  border-bottom:1px solid #eee;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:rgba(0,0,0,0.3);
  display:none;
  z-index:900;
}

.overlay.active{
  display:block;
}

/* NAV */
.nav{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  background:white;
  border-radius:30px;
  display:flex;
  justify-content:space-around;
  padding:14px 10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.12);
}

.item{
  font-size:20px;
  color:#64748b;
}

</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-img"></div>
  <div class="circle"></div>
  <div class="text">
    <h2>Bilimchi app</h2>
    <p>Yuklanmoqda...</p>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="user">
    <img src="https://i.pravatar.cc/100">
    <div>Foydalanuvchi</div>
  </div>

  <div class="menu-item">📚 Kurslar</div>
  <div class="menu-item">🎯 Testlar</div>
  <div class="menu-item">🏆 Reyting</div>
  <div class="menu-item">💎 Premium</div>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <div class="header">
    <div onclick="toggleMenu()">☰</div>
    <div class="title">Bilimchi</div>
    <div>🔔</div>
  </div>

  <!-- TOP CARD -->
  <div style="padding:20px;">
    <div style="
      background:#111827;
      color:white;
      padding:20px;
      border-radius:20px;
    ">
      <h3>📘 Darsni davom ettirish</h3>
      <p style="opacity:0.7;">Frontend asoslari</p>
      <div style="margin-top:10px;height:6px;background:#374151;border-radius:10px;">
        <div style="width:60%;height:100%;background:#3b82f6;border-radius:10px;"></div>
      </div>
    </div>
  </div>

  <!-- QUICK ACTION -->
  <div style="display:flex;gap:10px;padding:0 20px;">
    <div style="flex:1;background:white;padding:15px;border-radius:15px;text-align:center;">
      📚<br>Kurslar
    </div>
    <div style="flex:1;background:white;padding:15px;border-radius:15px;text-align:center;">
      🎯<br>Test
    </div>
    <div style="flex:1;background:white;padding:15px;border-radius:15px;text-align:center;">
      🏆<br>Reyting
    </div>
  </div>

  <!-- PROGRESS -->
  <div style="padding:20px;">
    <div style="background:white;padding:20px;border-radius:20px;">
      🔥 5 kun ketma-ket o‘qiding!
    </div>
  </div>
  <!-- PREMIUM -->
  <div style="padding:0 20px;">
    <div style="
      background:linear-gradient(135deg,#7c3aed,#a78bfa);
      color:white;
      padding:20px;
      border-radius:20px;
    ">
      💎 Premium och!
    </div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <div class="item">🏠</div>
    <div class="item">📚</div>
    <div class="item">🎯</div>
    <div class="item">🏆</div>
    <div class="item">💎</div>
  </div>

</div>

<script>
setTimeout(()=>{
  document.getElementById("loader").style.display="none";
  document.getElementById("main").style.display="block";
},1500);

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

function closeMenu(){
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
