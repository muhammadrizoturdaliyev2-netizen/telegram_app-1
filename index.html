<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilimchi</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(180deg, #f8fafc, #eef2f7);
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 18px;
}

.menu {
  font-size: 22px;
  cursor: pointer;
}

.title {
  font-weight: 600;
  color: #a16207;
}

.bell {
  font-size: 20px;
}

/* MAIN */
.container {
  padding: 20px;
}

/* CARD */
.card {
  height: 120px;
  border-radius: 20px;
  background: linear-gradient(135deg, #e2e8f0, #cbd5f5);
  margin-bottom: 30px;
}

/* BUTTON */
.main-btn {
  width: 100%;
  padding: 18px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

/* Hover effect */
.main-btn:active {
  transform: scale(0.97);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="menu">☰</div>
  <div class="title">ASOSIY OYNA</div>
  <div class="bell">🔔</div>
</div>

<!-- CONTENT -->
<div class="container">

  <!-- Placeholder card -->
  <div class="card"></div>

  <!-- Button -->
  <button class="main-btn">
    Boshlash
  </button>

</div>

</body>
</html>
