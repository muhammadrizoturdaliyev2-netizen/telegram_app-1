<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilimchi</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:sans-serif;
  background:#f8fafc;
  width:100vw;
  overflow-x:hidden;
}

/* LOADER */
.loader{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:#f8fafc;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  z-index:999;
}

.loader-img{
  width:100%;
  height:65%;
  background:url('loading.jpg') center/cover no-repeat;
}

.circle{
  width:40px;
  height:40px;
  border:4px solid #ddd;
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg)}
}

.text{
  text-align:center;
  padding-bottom:20px;
}

/* MAIN */
.main{
  display:none;
  width:100vw;
  min-height:100vh;
  padding-bottom:100px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

.title{
  color:#a16207;
  font-weight:bold;
}

/* CARD */
.card{
  margin:20px;
  height:120px;
  border-radius:15px;
  background:#e2e8f0;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100vh;
  background:white;
  box-shadow:5px 0 20px rgba(0,0,0,0.1);
  transition:0.3s;
  padding:20px;
  z-index:1000;
}

.sidebar.active{
  left:0;
}

/* USER */
.user{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}

.user img{
  width:45px;
  height:45px;
  border-radius:50%;
}

.user-name{
  font-weight:bold;
}

/* MENU ITEM */
.menu-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 0;
  border-bottom:1px solid #eee;
  font-size:15px;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:rgba(0,0,0,0.3);
  display:none;
  z-index:900;
}

.overlay.active{
  display:block;
}

/* NAV */
.nav{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  background:white;
  border-radius:30px;
  display:flex;
  justify-content:space-around;
  padding:14px 10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.12);
}

.item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:20px;
  color:#64748b;
  transition:0.2s;
}

/* ACTIVE */
.item.active{
  color:#3b82f6;
  transform:scale(1.2);
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-img"></div>

  <div class="circle"></div>

  <div class="text">
    <h2>Bilimchi app</h2>
    <p>Yuklanmoqda...</p>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

  <div class="user">
    <img src="https://i.pravatar.cc/100">
    <div class="user-name">Foydalanuvchi</div>
  </div>

  <div class="menu-item">📚 Mening kurslarim</div>
  <div class="menu-item">💎 Premium</div>
  <div class="menu-item">🎯 Vazifalar</div>
  <div class="menu-item">🏆 Reyting</div>
  <div class="menu-item">🎮 O‘yinlar</div>
  <div class="menu-item">⚙️ Sozlamalar</div>
  <div class="menu-item">📞 Yordam</div>

</div>

<!-- MAIN -->
<div class="main" id="main">

  <div class="header">
    <div onclick="toggleMenu()">☰</div>
    <div class="title">ASOSIY OYNA</div>
    <div>🔔</div>
  </div>

  <div class="card"></div>

  <!-- NAV -->
  <div class="nav">
    <div class="item active">🏠</div>
    <div class="item">📚</div>
    <div class="item">🎯</div>
    <div class="item">🏆</div>
    <div class="item">💎</div>
  </div>

</div>

<script>

/* LOADER */
setTimeout(function(){
  document.getElementById("loader").style.display = "none";
  document.getElementById("main").style.display = "block";
},1500);

/* MENU */
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}
  function closeMenu(){
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

/* ACTIVE NAV */
const items = document.querySelectorAll(".item");

items.forEach(item => {
  item.addEventListener("click", () => {

    items.forEach(i => i.classList.remove("active"));

    item.classList.add("active");

  });
});

</script>

</body>
</html>
