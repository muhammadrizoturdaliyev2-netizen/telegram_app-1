<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilimchi</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(180deg,#f8fafc,#eef2ff);
  overflow-x:hidden;
}

/* LOADER */
.loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#f8fafc;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  z-index:999;
}

.loader-img{
  width:100%;
  height:60%;
  background:url('loading.jpg') center/cover no-repeat;
}

.loader-text{
  text-align:center;
  padding:20px;
}

.circle{
  width:40px;height:40px;
  border:4px solid #ddd;
  border-top:4px solid #6366f1;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg)}}

/* START */
.start{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.start-box{
  width:90%;
  max-width:350px;
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;
}

.start-box input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

.start-box button{
  margin-top:15px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
}

/* MAIN */
.main{display:none;padding-bottom:120px}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:18px;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:white;
  padding:20px;
  transition:0.3s;
  z-index:1000;
}
.sidebar.active{left:0}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  display:none;
  z-index:900;
}
.overlay.active{display:block}

/* USER */
.user{text-align:center;margin-bottom:20px}
.user img{width:70px;height:70px;border-radius:50%}

/* QUICK */
.quick{
  display:flex;
  gap:12px;
  padding:0 20px;
}

.big{
  flex:1;
  height:140px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
  border-radius:22px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.column{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.small{
  flex:1;
  background:linear-gradient(135deg,#7c3aed,#a78bfa);
  color:white;
  border-radius:22px;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CARD */
.card{
  margin:20px;
  padding:20px;
  border-radius:20px;
  background:white;
}

/* NAV */
.nav{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  background:rgba(255,255,255,0.95);
  border-radius:30px;
  display:flex;
  justify-content:space-around;
  padding:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.nav div{
  font-size:22px;
  padding:8px;
  border-radius:10px;
}

.nav div:active{
  transform:scale(1.2);
}

/* GAME */
.game-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.game-card{
  padding:18px;
  border-radius:22px;
  color:white;
  text-align:center;
}

.free{background:#10b981}
.locked{background:#6366f1}
.locked::after{
  content:"🔒";
  position:absolute;
  top:10px;
  right:12px;
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-img"></div>
  <div class="loader-text">
    <h2>Bilimchi tayyorlanmoqda</h2>
    <p>Iltimos kuting...</p>
    <div class="circle"></div>
  </div>
</div>

<!-- START -->
<div class="start" id="start">
  <div class="start-box">
    <h2>Xush kelibsiz 👋</h2>
    <input id="nameInput" placeholder="Ism">
    <button onclick="startApp()">Boshlash</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="user">
    <img id="avatar">
    <h3 id="username"></h3>
  </div>
</div><!-- MAIN -->
<div class="main" id="main">

<div class="header">
  <div onclick="toggleMenu()">☰</div>
  <div>Bilimchi</div>
</div>

<!-- HOME -->
<div id="homeScreen">
  <div class="quick">
    <div class="big" onclick="show('games')">🎮</div>
    <div class="column">
      <div class="small" onclick="show('lesson')">📚</div>
      <div class="small" onclick="show('results')">🏆</div>
    </div>
  </div>
</div>

<!-- GAMES -->
<div id="gamesScreen" style="display:none;padding:20px;">
  <h2>🎮 O‘yinlar</h2>
  <div class="game-grid">
    <div class="game-card free" onclick="show('battle')">Quiz</div>
    <div class="game-card locked">Battle</div>
  </div>
</div>

<!-- LESSON -->
<div id="lessonScreen" style="display:none;padding:20px;">
  <div class="card" onclick="openLesson()">HTML</div>
</div>

<div id="lessonView" style="display:none;padding:20px;">
  HTML dars
</div>

<!-- BATTLE -->
<div id="battleScreen" style="display:none;padding:20px;">
  <button onclick="startBattle()">Start</button>
  <h3 id="qText"></h3>
</div>

<div id="resultsScreen" style="display:none;padding:20px;">Natija</div>

<!-- NAV -->
<div class="nav">
  <div onclick="show('home')">🏠</div>
  <div onclick="show('games')">🎮</div>
  <div onclick="show('lesson')">📚</div>
</div>

</div>

<script>

window.onload = function(){
  setTimeout(()=>{
    loader.style.display="none";
    start.style.display="flex";
  },3000);
};

function startApp(){
  username.innerText = nameInput.value;
  avatar.src = "https://ui-avatars.com/api/?name="+nameInput.value;
  start.style.display="none";
  main.style.display="block";
}

function toggleMenu(){
  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");
}

function closeMenu(){
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
}

function show(screen){
  ["home","games","lesson","lessonView","battle","results"]
  .forEach(id=>{
    let el=document.getElementById(id+"Screen");
    if(el) el.style.display="none";
  });

  document.getElementById(screen+"Screen").style.display="block";
}

function openLesson(){
  lessonScreen.style.display="none";
  lessonView.style.display="block";
}

function startBattle(){
  qText.innerText="HTML nima?";
}

</script>

</body>
</html>
